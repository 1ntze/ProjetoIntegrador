<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberEdu | Perfil</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="perfil.css">

    <!-- Icons -->
    <link rel="icon" type="image/png" href="img/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="dark-mode">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="img/logoof.png" width="100" height="70" class="me-2 logo-energia">
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Missões</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ranking</a></li>
            </ul>

            <button onclick="toggleDark(event)" id="themeBtn" class="btn btn-outline-primary me-3">
                <i class="bi bi-moon"></i>
            </button>

            <button class="btn btn-custom">Sair</button>

        </div>
    </div>
</nav>

<!-- PERFIL -->
<section class="py-5">
    <div class="container">

        <div class="card glass-card p-5 text-center">

            <!-- FOTO -->
            <div class="position-relative d-inline-block">
                <img id="profilePic" src="img/user.png" class="rounded-circle profile-img">

                <label class="btn btn-primary btn-sm edit-btn">
                    <i class="bi bi-pencil"></i>
                    <input type="file" id="uploadPic" hidden>
                </label>
            </div>

            <!-- NOME -->
            <h2 class="mt-4"><b>Nat</b></h2>
            <p class="text-muted">Agente Digital</p>

            <!-- INFORMAÇÕES -->
            <div class="d-flex justify-content-center gap-4 mt-4 flex-wrap">

                <div class="status-box glass-card p-3">
                    <h5><b>Email</b></h5>
                    <p id="userEmail">usuario@email.com</p>
                </div>

                <div class="status-box glass-card p-3">
                    <h5><b>Usuário</b></h5>
                    <p id="userId">@nat_dev</p>
                </div>

                <div class="status-box glass-card p-3">
                    <h5><b>Conta</b></h5>
                    <p id="userDate">Abril 2026</p>
                </div>

            </div>

        </div>

    </div>
</section>

<!-- FOOTER -->
<!-- FOOTER -->
<footer class="footer-insane position-relative overflow-hidden mt-5">

  <!-- GRID DE FUNDO -->
  <div class="grid-bg"></div>

  <!-- PARTÍCULAS -->
  <div class="particles"></div>

  <!-- LINHA NEON -->
  <div class="neon-line"></div>

  <div class="container text-center position-relative z-2 py-5">

    <!-- LOGO -->
    <div class="footer-logo mb-3">
      <img src="img/logoof.png" alt="CyberEdu Logo" class="logo-img" width="120">
    </div>

    <!-- ÍCONES SOCIAIS -->
    <div class="social-icons mb-4">
      <a href="#" class="mx-2"><i class="bi bi-instagram"></i></a>
      <a href="#" class="mx-2"><i class="bi bi-discord"></i></a>
      <a href="#" class="mx-2"><i class="bi bi-youtube"></i></a>
      <a href="#" class="mx-2"><i class="bi bi-github"></i></a>
    </div>

    <!-- COPYRIGHT -->
    <p class="copy small mb-0">© 2026 CyberEdu — Projeto Integrador I — Universidade Virtual do <br> Estado de São Paulo | UNIVESP</p>

  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// DARK MODE
function toggleDark(e){
    const body = document.body;
    const btn = document.getElementById("themeBtn");

    body.classList.toggle("dark-mode");

    if(body.classList.contains("dark-mode")){
        btn.innerHTML = '<i class="bi bi-moon"></i>';
    }else{
        btn.innerHTML = '<i class="bi bi-sun"></i>';
    }
}

// TROCAR FOTO
document.getElementById("uploadPic").addEventListener("change", function(){
    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            document.getElementById("profilePic").src = e.target.result;

            // salva no navegador
            localStorage.setItem("profilePic", e.target.result);
        }

        reader.readAsDataURL(file);
    }
});

// CARREGAR FOTO + DADOS
window.onload = () => {
    const savedPic = localStorage.getItem("profilePic");
    if(savedPic){
        document.getElementById("profilePic").src = savedPic;
    }

    const email = localStorage.getItem("email");
    const user = localStorage.getItem("user");
    const date = localStorage.getItem("date");

    if(email) document.getElementById("userEmail").innerText = email;
    if(user) document.getElementById("userId").innerText = user;
    if(date) document.getElementById("userDate").innerText = date;
}
</script>

</body>
</html>
